---
- name: Installer wget et tar sur Ubuntu
  apt:
    name:
      - wget
      - tar
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Installer wget et tar sur Rocky Linux
  dnf:
    name:
      - wget
      - tar
    state: present
  when: ansible_os_family == "RedHat"

- name: Télécharger Drupal
  get_url:
    url: "{{ drupal_download_url }}"
    dest: /tmp/drupal-{{ drupal_version }}.tar.gz
    mode: "0644"

- name: Extraire Drupal dans /tmp
  unarchive:
    src: /tmp/drupal-{{ drupal_version }}.tar.gz
    dest: /tmp
    remote_src: yes
    creates: /tmp/drupal-{{ drupal_version }}/index.php

- name: Créer le dossier d'installation
  file:
    path: "{{ drupal_install_dir }}"
    state: directory
    mode: "0755"

- name: Vérifier la version Drupal installée
  shell: cat {{ drupal_install_dir }}/.drupal_version_installed
  register: installed_drupal_version
  changed_when: false
  failed_when: false

- name: Supprimer l'ancienne installation Drupal si la version a changé
  file:
    path: "{{ drupal_install_dir }}"
    state: absent
  when: installed_drupal_version.stdout != drupal_version

- name: Recréer le dossier d'installation Drupal
  file:
    path: "{{ drupal_install_dir }}"
    state: directory
    mode: "0755"

- name: Copier Drupal vers le dossier d'installation
  command: cp -r /tmp/drupal-{{ drupal_version }}/. {{ drupal_install_dir }}/
  args:
    creates: "{{ drupal_install_dir }}/index.php"

- name: Créer le dossier sites/default/files
  file:
    path: "{{ drupal_install_dir }}/sites/default/files"
    state: directory
    mode: "0755"

- name: Créer le dossier config_sync
  file:
    path: "{{ drupal_install_dir }}/sites/default/files/config_sync"
    state: directory
    mode: "0755"

- name: Déployer le fichier settings.php
  template:
    src: settings.php.j2
    dest: "{{ drupal_install_dir }}/sites/default/settings.php"
    mode: "0644"

- name: Donner les bonnes permissions sur Ubuntu
  file:
    path: "{{ drupal_install_dir }}"
    owner: www-data
    group: www-data
    recurse: yes
  when: ansible_os_family == "Debian"

- name: Donner les bonnes permissions sur Rocky Linux
  file:
    path: "{{ drupal_install_dir }}"
    owner: apache
    group: apache
    recurse: yes
  when: ansible_os_family == "RedHat"

- name: Enregistrer la version Drupal installée
  copy:
    dest: "{{ drupal_install_dir }}/.drupal_version_installed"
    content: "{{ drupal_version }}\n"
    mode: "0644"
